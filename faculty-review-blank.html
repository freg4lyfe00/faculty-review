<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Review</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --c-teal:#00867B; --c-amber:#EBAB21; --c-purple:#553178; --c-dark-teal:#00556F;
      --c-teal-light:rgba(0,134,123,.12); --c-amber-light:rgba(235,171,33,.12); --c-purple-light:rgba(85,49,120,.12);
      --c-bg-primary:#ffffff; --c-bg-secondary:#f5f5f7; --c-bg-tertiary:#ebebed;
      --c-text-primary:#1a1a1a; --c-text-secondary:#4a4a4a; --c-text-muted:#767676;
      --c-border:#e0e0e0; --c-border-strong:#b0b0b0; --c-amber-fg:#8a5e00;
      --radius-sm:4px; --radius-md:8px; --radius-lg:12px; --shadow-sm:0 1px 3px rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --c-bg-primary:#1c1c1e; --c-bg-secondary:#242426; --c-bg-tertiary:#2e2e30;
        --c-text-primary:#f0f0f0; --c-text-secondary:#c0c0c0; --c-text-muted:#888;
        --c-border:#3a3a3c; --c-border-strong:#58585a; --c-amber-fg:#f5c842;
        --c-teal-light:rgba(0,134,123,.22); --c-amber-light:rgba(235,171,33,.18); --c-purple-light:rgba(85,49,120,.22);
        --shadow-sm:0 1px 3px rgba(0,0,0,.35);
      }
      .badge-dark-teal { color: var(--c-teal); }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui,-apple-system,sans-serif; color: var(--c-text-primary); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #app-header { background: var(--c-purple); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.5rem; flex-shrink: 0; }
    .faculty-name { font-size: 1.1rem; font-weight: 600; }
    .faculty-title { font-size: .85rem; opacity: .75; margin-top: .15rem; }
    .ay-pills { display: flex; gap: .5rem; align-items: center; }
    .ay-pill { background: transparent; border: 1px solid rgba(255,255,255,.55); border-radius: 999px; color: #fff; cursor: pointer; font-size: .82rem; padding: .25rem .8rem; transition: background .15s; }
    .ay-pill:hover { background: rgba(255,255,255,.15); }
    .ay-pill.active { background: #fff; border-color: #fff; color: var(--c-purple); font-weight: 600; }
    .ay-add { padding: .22rem .65rem; font-size: 1.1rem; line-height: 1.2; }
    .ay-pill-wrap { align-items: center; display: inline-flex; }
    .ay-del { background: none; border: none; color: rgba(255,255,255,0); cursor: pointer; font-size: .75rem; margin-left: -.15rem; padding: .1rem .3rem .1rem .1rem; transition: color .15s; }
    .ay-pill-wrap:hover .ay-del { color: rgba(255,255,255,.55); }
    .ay-del:hover { color: #fff !important; }
    #tab-bar { background: var(--c-bg-primary); border-bottom: 1px solid var(--c-border); box-shadow: var(--shadow-sm); display: flex; flex-shrink: 0; overflow-x: auto; padding: 0 1rem; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--c-text-muted); cursor: pointer; font-size: .88rem; padding: .7rem 1rem; transition: color .15s, border-color .15s; white-space: nowrap; }
    .tab-btn:hover { color: var(--c-text-secondary); }
    .tab-btn.active { border-bottom-color: var(--c-teal); color: var(--c-teal); font-weight: 500; }
    #content-area { background: var(--c-bg-secondary); flex: 1; overflow-y: auto; padding: 1.5rem; }
    .tab-placeholder { background: var(--c-bg-primary); border: 1px solid var(--c-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); color: var(--c-text-muted); padding: 3rem 2rem; text-align: center; }
    #app-footer { background: var(--c-bg-primary); border-top: 1px solid var(--c-border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; padding: .7rem 1.5rem; }
    .footer-right { display: flex; gap: .75rem; }
    .dirty-badge { background: var(--c-amber-light); border: 1px solid var(--c-amber); border-radius: var(--radius-sm); color: var(--c-amber-fg); font-size: .8rem; font-weight: 500; padding: .2rem .65rem; }
    .dirty-badge.hidden { display: none; }
    .btn { border-radius: var(--radius-sm); cursor: pointer; font-size: .875rem; font-weight: 500; padding: .45rem 1rem; transition: background .15s, border-color .15s, color .15s; }
    .btn-primary { background: var(--c-teal); border: 1px solid var(--c-teal); color: #fff; }
    .btn-primary:hover { background: var(--c-dark-teal); border-color: var(--c-dark-teal); }
    .btn-outlined { background: transparent; border: 1px solid var(--c-border-strong); color: var(--c-text-secondary); }
    .btn-outlined:hover { background: var(--c-bg-tertiary); }
    /* Cards */
    .card { background: var(--c-bg-primary); border: 1px solid var(--c-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); margin-bottom: 1.25rem; overflow: hidden; }
    .card-header { align-items: center; border-bottom: 1px solid var(--c-border); display: flex; justify-content: space-between; padding: .875rem 1.25rem; }
    .card-title { font-size: .95rem; font-weight: 600; }
    .card-note { color: var(--c-text-muted); font-size: .75rem; margin-top: .2rem; }
    .profile-edit-btn { background: none; border: none; color: rgba(255,255,255,.45); cursor: pointer; font-size: .82rem; margin-top: .15rem; padding: .1rem .3rem; }
    .profile-edit-btn:hover { color: #fff; }
    .card-add-footer { padding: .35rem .75rem .6rem; }
    .btn-add-full { background: none; border: 1.5px dashed var(--c-border); border-radius: var(--radius-sm); color: var(--c-teal); cursor: pointer; font-size: 1.1rem; font-weight: 500; padding: .35rem; transition: border-color .15s, background .15s; width: 100%; }
    .btn-add-full:hover { background: var(--c-teal-light); border-color: var(--c-teal); }
    /* Tables */
    .data-table { border-collapse: collapse; width: 100%; }
    .data-table th { border-bottom: 1px solid var(--c-border); color: var(--c-text-muted); font-size: .72rem; font-weight: 500; letter-spacing: .04em; padding: .5rem .75rem; text-align: left; text-transform: uppercase; }
    .data-table td { border-bottom: 1px solid var(--c-border); font-size: .875rem; padding: .55rem .75rem; vertical-align: middle; }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover .row-actions { opacity: 1; }
    .row-actions { opacity: 0; transition: opacity .15s; white-space: nowrap; }
    .icon-btn { background: none; border: none; color: var(--c-text-muted); cursor: pointer; padding: .2rem .3rem; }
    .icon-btn:hover { color: var(--c-text-primary); }
    .table-footer { align-items: center; border-top: 1px solid var(--c-border); color: var(--c-text-muted); display: flex; font-size: .78rem; justify-content: space-between; padding: .6rem 1.25rem; }
    .show-all-btn { background: none; border: none; color: var(--c-teal); cursor: pointer; font-size: .78rem; }
    /* Badges */
    .badge { border-radius: var(--radius-sm); display: inline-block; font-size: .75rem; font-weight: 500; padding: .15rem .5rem; }
    .badge-teal { background: var(--c-teal-light); color: var(--c-teal); }
    .badge-amber { background: var(--c-amber-light); color: var(--c-amber-fg); }
    .badge-muted { background: var(--c-bg-tertiary); color: var(--c-text-muted); }
    .badge-purple { background: var(--c-purple-light); color: var(--c-purple); }
    .badge-dark-teal { background: var(--c-teal-light); color: var(--c-dark-teal); }
    /* Edit rows */
    .edit-row td { background: var(--c-bg-secondary); padding: .4rem .75rem; }
    .edit-row input, .edit-row select, .edit-row textarea { background: var(--c-bg-primary); border: 1px solid var(--c-border-strong); border-radius: var(--radius-sm); color: var(--c-text-primary); font-family: inherit; font-size: .85rem; padding: .3rem .5rem; width: 100%; }
    .edit-row input:focus, .edit-row select:focus, .edit-row textarea:focus { border-color: var(--c-teal); outline: none; }
    .edit-row textarea { min-height: 3.5rem; resize: vertical; }
    .edit-row select { height: 2rem; }
    .edit-actions { display: flex; gap: .5rem; margin-top: .35rem; }
    .btn-save-row { background: none; border: none; color: var(--c-teal); cursor: pointer; font-size: .82rem; font-weight: 600; padding: 0; }
    .btn-cancel-row { background: none; border: none; color: var(--c-text-muted); cursor: pointer; font-size: .82rem; padding: 0; }
    /* Delete confirm */
    .delete-confirm td { background: var(--c-amber-light); }
    .delete-confirm-msg { align-items: center; display: flex; font-size: .875rem; gap: .75rem; }
    .btn-confirm-yes { background: none; border: none; color: var(--c-teal); cursor: pointer; font-size: .875rem; font-weight: 600; }
    .btn-confirm-no { background: none; border: none; color: var(--c-text-muted); cursor: pointer; font-size: .875rem; }
    .empty-state { color: var(--c-text-muted); font-size: .875rem; font-style: italic; padding: 1.5rem; text-align: center; }
    /* Overview */
    .metrics-grid { display: grid; gap: 1rem; grid-template-columns: repeat(4,1fr); margin-bottom: 1.25rem; }
    .metric-card { background: var(--c-bg-secondary); border: 1px solid var(--c-border); border-radius: var(--radius-md); padding: 1rem 1.25rem; }
    .metric-label { color: var(--c-text-muted); font-size: .7rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; }
    .metric-value { color: var(--c-text-primary); font-size: 1.6rem; font-weight: 500; line-height: 1.2; margin: .2rem 0 .15rem; }
    .delta-pos { color: var(--c-teal); font-size: .75rem; }
    .delta-neg { color: var(--c-amber-fg); font-size: .75rem; }
    .delta-same { color: var(--c-text-muted); font-size: .75rem; }
    /* Snapshot (Overview) */
    .snapshot-body { background: var(--c-bg-primary); border: 1px solid var(--c-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); margin-bottom: 1.25rem; overflow: hidden; }
    .snapshot-section { border-bottom: 0.5px solid var(--c-border); padding: 1rem 1.5rem; }
    .snapshot-section:last-child { border-bottom: none; }
    .snapshot-section h3 { color: var(--c-purple); font-size: 13px; font-weight: 500; letter-spacing: .04em; margin-bottom: 10px; text-transform: uppercase; }
    .snapshot-row { align-items: center; display: flex; font-size: 13px; gap: 12px; justify-content: space-between; padding: 4px 0; }
    .snap-text { color: var(--c-text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .snap-meta { color: var(--c-text-muted); font-size: 12px; }
    .snapshot-more { background: none; border: none; color: var(--c-text-muted); cursor: pointer; font-size: 12px; padding: 0; }
    .snapshot-more:hover { color: var(--c-teal); text-decoration: underline; }
    .snapshot-empty { color: var(--c-text-muted); font-size: 13px; font-style: italic; margin: 0; padding: 4px 0; }
    .snapshot-contrib { -webkit-box-orient: vertical; -webkit-line-clamp: 3; color: var(--c-text-primary); display: -webkit-box; font-size: 13px; line-height: 1.55; overflow: hidden; }
    /* Mentor section */
    .mentor-col-headers { border-bottom: 1px solid var(--c-border); display: flex; gap: .75rem; padding: .35rem .75rem; }
    .mentor-col-label { color: var(--c-text-muted); flex: 1; font-size: .68rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }
    .mentor-row { align-items: center; border-bottom: 1px solid var(--c-border); display: flex; gap: .75rem; padding: .45rem .75rem; }
    .mentor-row input { background: var(--c-bg-primary); border: 1px solid var(--c-border); border-radius: var(--radius-sm); color: var(--c-text-primary); flex: 1; font-family: inherit; font-size: .875rem; padding: .3rem .5rem; }
    .mentor-row input:focus { border-color: var(--c-teal); outline: none; }
    .cell-italic { font-style: italic; }
    /* Self-evaluation */
    .se-label { color: var(--c-text-secondary); font-size: .875rem; font-weight: 500; margin-bottom: .3rem; margin-top: .75rem; }
    .se-hint { color: var(--c-text-muted); font-size: .75rem; line-height: 1.45; margin-bottom: .5rem; }
    .se-textarea { background: var(--c-bg-primary); border: 1px solid var(--c-border); border-radius: var(--radius-sm); color: var(--c-text-primary); font-family: inherit; font-size: .875rem; overflow: hidden; padding: .5rem .65rem; resize: none; width: 100%; }
    .se-textarea:focus { border-color: var(--c-teal); outline: none; }
    .goal-block { border: 1px solid var(--c-border); border-radius: var(--radius-md); margin-bottom: .75rem; padding: .75rem; position: relative; }
    .goal-block.carried { background: var(--c-bg-secondary); }
    .goal-text-input { background: transparent; border: none; border-bottom: 1.5px dashed var(--c-border-strong); color: var(--c-text-primary); font-family: inherit; font-size: .875rem; font-weight: 500; outline: none; padding-bottom: 2px; width: 100%; }
    .goal-text-input:focus { border-bottom-color: var(--c-teal); border-bottom-style: solid; }
    .goal-text-input::placeholder { color: var(--c-text-muted); font-weight: 400; }
    .goal-top-fields { display: grid; gap: .5rem; grid-template-columns: 1fr 1fr; margin: .5rem 0 .4rem; }
    .goal-sub-label { color: var(--c-text-muted); font-size: .72rem; font-weight: 500; letter-spacing: .04em; margin-bottom: .2rem; text-transform: uppercase; }
    .goal-delete { background: none; border: none; color: var(--c-text-muted); cursor: pointer; opacity: 0; padding: .2rem; position: absolute; right: .5rem; top: .5rem; transition: opacity .15s; }
    .goal-block:hover .goal-delete { opacity: 1; }
    .ay-tag { background: var(--c-bg-tertiary); border-radius: var(--radius-sm); color: var(--c-text-muted); display: inline-block; font-size: .72rem; font-weight: 500; margin-bottom: .3rem; padding: .1rem .45rem; }
    .ld-cols { border-bottom: 1px solid var(--c-border); display: flex; gap: .75rem; padding: .35rem .75rem; }
    .ld-row { align-items: center; border-bottom: 1px solid var(--c-border); display: flex; gap: .75rem; padding: .45rem .75rem; }
    .ld-row:last-child { border-bottom: none; }
    .ld-row input { background: var(--c-bg-primary); border: 1px solid var(--c-border); border-radius: var(--radius-sm); color: var(--c-text-primary); flex: 1; font-family: inherit; font-size: .875rem; padding: .3rem .5rem; }
    .ld-row input:focus { border-color: var(--c-teal); outline: none; }
    .submitted-badge { background: var(--c-teal-light); border: 1px solid var(--c-teal); border-radius: 999px; color: var(--c-teal); font-size: .72rem; font-weight: 500; padding: .1rem .5rem; }
    .footer-left { align-items: center; display: flex; gap: 1rem; }
    .footer-downloads { align-items: center; display: flex; gap: .5rem; }
    .downloads-label { color: var(--c-text-muted); font-size: .68rem; font-weight: 500; letter-spacing: .06em; margin-right: .1rem; text-transform: uppercase; }
    .btn-dl-readonly { background: var(--c-purple-light); border: 1px solid var(--c-purple); color: var(--c-purple); }
    .btn-dl-readonly:hover { filter: brightness(.92); }
    .btn-dl-editable { background: var(--c-teal); border: 1px solid var(--c-teal); color: #fff; }
    .btn-dl-editable:hover { background: var(--c-dark-teal); border-color: var(--c-dark-teal); }
    .se-check-label { align-items: center; cursor: pointer; display: flex; font-size: .875rem; gap: .5rem; margin-bottom: .75rem; }
    .se-check-label input[type=checkbox] { accent-color: var(--c-teal); flex-shrink: 0; height: 1rem; width: 1rem; }
    /* Trends */
    .trends-grid { display: grid; gap: 1.25rem; grid-template-columns: 1fr 1fr; margin-bottom: 1.25rem; }
    /* Pulse animation */
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
    .dirty-badge:not(.hidden) { animation: pulse 2s ease-in-out infinite; }
    /* Setup card */
    .setup-card { background: var(--c-bg-primary); border-bottom: 1px solid var(--c-border); flex-shrink: 0; }
    .setup-input { background: var(--c-bg-primary); border: 1px solid var(--c-border-strong); border-radius: var(--radius-sm); color: var(--c-text-primary); font-family: inherit; font-size: .875rem; padding: .35rem .6rem; width: 100%; }
    .setup-input:focus { border-color: var(--c-teal); outline: none; }
    /* Alerts / banners */
    .validation-alert { align-items: flex-start; background: var(--c-amber-light); border: 1px solid var(--c-amber); border-radius: var(--radius-md); color: var(--c-amber-fg); display: flex; font-size: .875rem; gap: .75rem; justify-content: space-between; margin-bottom: 1rem; padding: .75rem 1rem; }
    .validation-alert.hidden { display: none; }
    .validation-alert ul { margin: .25rem 0 0 1rem; }
    .recovery-banner { align-items: center; background: var(--c-amber-light); border-bottom: 1px solid var(--c-amber); color: var(--c-amber-fg); display: flex; flex-shrink: 0; font-size: .85rem; gap: .75rem; padding: .6rem 1.5rem; }
    .banner-btn { background: none; border: 1px solid var(--c-amber); border-radius: var(--radius-sm); color: var(--c-amber-fg); cursor: pointer; font-size: .82rem; font-weight: 600; padding: .2rem .6rem; }
    .banner-btn-muted { background: none; border: none; color: var(--c-text-muted); cursor: pointer; font-size: .82rem; }
    /* Print */
    .section-print-header { display: none; }
    @media print {
      #tab-bar, #app-footer, .ay-pills, .btn-add, .btn-add-full, .card-add-footer, .row-actions, .goal-delete, .recovery-banner, .validation-alert, .setup-card { display: none; }
      .card { border: 0.5px solid #ccc; box-shadow: none; break-inside: avoid; margin-bottom: 1rem; }
      body { color: #000; font-size: 12px; height: auto; overflow: visible; }
      #content-area { overflow: visible; }
      .section-print-header { border-bottom: 1px solid #553178; color: #553178; display: block; font-size: 1.1rem; margin: 0 0 1rem; padding-bottom: 4px; }
    }
  </style>
</head>
<body>
  <header id="app-header">
    <div id="faculty-info"><div id="faculty-name" class="faculty-name"></div><div id="faculty-title" class="faculty-title"></div></div>
    <div style="display:flex;align-items:center;gap:.75rem">
      <div id="ay-pills" class="ay-pills"></div>
      <button id="btn-import" class="ay-pill">Import data</button>
    </div>
  </header>
  <nav id="tab-bar"></nav>
  <main id="content-area"></main>
  <footer id="app-footer">
    <div class="footer-left">
      <div class="footer-downloads">
        <span class="downloads-label">Save/Download a copy:</span>
        <button id="btn-export" class="btn btn-dl-readonly">Read-Only</button>
        <button id="btn-save" class="btn btn-dl-editable">Editable File</button>
      </div>
      <span id="dirty-badge" class="dirty-badge hidden">Unsaved changes</span>
    </div>
    <div class="footer-right">
      <button id="btn-submit" class="btn btn-primary">Submit</button>
    </div>
  </footer>

  <script id="appData" type="application/json">
{
  "faculty": { "name": "", "title": "", "division": "HSR - Pediatrics" },
  "years": {},
  "activeYear": ""
}
  </script>

  <script>
    const TABS = [
      { id:'overview', label:'Overview' }, { id:'trends', label:'Trends' },
      { id:'publications', label:'Publications' }, { id:'presentations', label:'Presentations' },
      { id:'grants', label:'Grants' }, { id:'mentors', label:'Mentors & Mentees' },
      { id:'selfeval', label:'Self-evaluation' },
    ];

    let state = {}, savedSnapshot = '', activeTab = 'overview';

    // ── Persistence ──────────────────────────────────────────────────────────
    function loadState() { state = JSON.parse(document.getElementById('appData').textContent); normalizeState(); savedSnapshot = JSON.stringify(state); }
    function isDirty() { return JSON.stringify(state) !== savedSnapshot; }
    function updateDirtyIndicator() { document.getElementById('dirty-badge').classList.toggle('hidden', !isDirty()); }
    function switchTab(id) { activeTab = id; autoSave(); render(); }
    function switchYear(yr) { state.activeYear = yr; updateDirtyIndicator(); render(); }
    function addYear() {
      const raw = prompt('Enter academic year (e.g. 2025-26):');
      if (!raw || !raw.trim()) return;
      const yr = raw.trim();
      if (state.years[yr]) { alert('That year already exists.'); return; }
      const prevYr = state.activeYear;
      state.years[yr] = { publications:[], presentations:[], grants:[], mentors:[], mentees:[], selfeval:{} };
      carryForwardGoals(prevYr, yr);
      normalizeState();
      state.activeYear = yr; updateDirtyIndicator(); render();
    }
    function saveMasterFile() {
      document.getElementById('appData').textContent = '\n' + JSON.stringify(state, null, 2) + '\n';
      const blob = new Blob(['<!DOCTYPE html>\n' + document.documentElement.outerHTML], { type:'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `faculty-review-${(state.faculty.name||'unnamed').replace(/[^a-z0-9]/gi,'-')}-${state.activeYear}.html`; a.click();
      URL.revokeObjectURL(url); savedSnapshot = JSON.stringify(state); updateDirtyIndicator();
    }
    function exportThisAY() {
      const yr = state.activeYear, d = state.years[yr]||{}, se = d.selfeval||{}, f = state.faculty, m = getMetrics(yr);
      const e = s => esc(s), nl = s => esc(s||'').replace(/\n/g,'<br>');
      const bm = { published:'teal', submitted:'amber', 'in-revision':'amber', 'in-preparation':'muted', awarded:'teal', 'under-review':'amber', 'not-funded':'muted', 'invited-talk':'purple', 'oral-abstract':'teal', poster:'muted', workshop:'muted', undergraduate:'muted', 'medical-student':'muted', 'graduate-student':'muted', resident:'dteal', fellow:'dteal', faculty:'purple' };
      const eb = v => `<span class="b b-${bm[v]||'muted'}">${lbl(v)}</span>`;

document.addEventListener("DOMContentLoaded",()=>{loadState();render();});`;

    function normalizeState() {
      Object.keys(state.years).forEach(yr => {
        const d = state.years[yr];
        if (!d.selfeval) d.selfeval = {};
        const se = d.selfeval;
        if (!se.goalsReview || !se.goalsReview.length) se.goalsReview = [{ id:generateId(), goalText:'', carriedFrom:'', progress:'', barriers:'', feedback:'' }];
        if (!se.goalsNext) se.goalsNext = [];
        if (!se.leadership) se.leadership = [];
        if (!se.promotion) se.promotion = {};
        if (!se.careReview) se.careReview = {};
      });
    }

    function carryForwardGoals(fromYr, toYr) {
      const source = state.years[fromYr]?.selfeval?.goalsNext ?? [];
      state.years[toYr].selfeval.goalsReview = source.length
        ? source.map(g => ({ id:generateId(), goalText:g.goalText||'', carriedFrom:fromYr, progress:'', barriers:'', feedback:'' }))
        : [{ id:generateId(), goalText:'', carriedFrom:'', progress:'', barriers:'', feedback:'' }];
    }

    function autoExpand(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }

    function showProfileCard() {

      document.getElementById('content-area').before(card);

    }
    function renderSetupCard() { if (!state.faculty.name) showProfileCard(); }

    let pendingBackup = null;
    function autoSave() {
      try { localStorage.setItem('facultyReviewBackup', JSON.stringify(state)); localStorage.setItem('facultyReviewBackupTime', new Date().toISOString()); } catch(_) {}
    }
    function checkRecovery() {
      if (state.faculty.name) return;
      try {
        const raw = localStorage.getItem('facultyReviewBackup'), t = localStorage.getItem('facultyReviewBackupTime');
        if (!raw) return;
        const bk = JSON.parse(raw); if (!bk?.faculty?.name) return;
        pendingBackup = bk; showRecoveryBanner(t);

    }
    function showRecoveryBanner(backupTime) {
      const d = new Date(backupTime), ts = isNaN(d.getTime()) ? backupTime : d.toLocaleString();
      const banner = document.createElement('div'); banner.id = 'recovery-banner'; banner.className = 'recovery-banner';
      banner.innerHTML = `<span>A backup from ${ts} was found.</span><button data-action="restore-backup" class="banner-btn">Restore backup</button><button data-action="dismiss-banner" class="banner-btn-muted">Dismiss</button>`;
      document.getElementById('content-area').before(banner);
    }

    // ── Import ───────────────────────────────────────────────────────────────
    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = function() {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          let data;
          try { data = JSON.parse(ev.target.result); }
          catch(_) { alert('Could not read file: not valid JSON.'); return; }
          if (typeof data.academicYear !== 'string' || !data.academicYear.trim()) {
            alert('Invalid file: missing or invalid "academicYear" field (expected a string like "2025-2026").');
            return;
          }
          const sections = ['publications', 'presentations', 'grants', 'mentees'];
          const found = sections.filter(k => Array.isArray(data[k]));
          if (!found.length) {
            alert('Invalid file: must contain at least one of publications, presentations, grants, or mentees (as arrays).');
            return;
          }

          const yr = data.academicYear.trim();
          const isNew = !state.years[yr];

          if (!isNew) {
            const activeYr = state.activeYear;
            const msg = yr === activeYr
              ? `This will replace existing Publications, Presentations, Grants, and Mentees data for ${yr}. Continue?`
              : `The year currently shown is ${activeYr}, but this file contains data for ${yr}. This will replace existing data for ${yr} (not the year currently on screen). Continue?`;
            if (!confirm(msg)) return;
          }

          if (isNew) {
            state.years[yr] = { publications:[], presentations:[], grants:[], mentors:[], mentees:[], selfeval:{} };
            normalizeState();
          }

          found.forEach(section => {
            state.years[yr][section] = data[section].map(row => {
              const out = { id: generateId() };
              COLS[section].forEach(c => { out[c.key] = typeof row[c.key] === 'string' ? row[c.key] : ''; });
              return out;
            });
          });

          const summary = found.map(k => `${data[k].length} ${k}`).join(', ');
          state.activeYear = yr;
          updateDirtyIndicator();
          render();
          showAlert(`Imported ${summary} for ${yr}.`);
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // ── Data utilities ───────────────────────────────────────────────────────
    function generateId() { return Math.random().toString(36).slice(2, 9); }
    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function getPriorYear(yr) { const k = Object.keys(state.years).sort(); const i = k.indexOf(yr); return i > 0 ? k[i-1] : null; }
    function getMetrics(yr) {
      const d = state.years[yr] || {};
      return { publications:(d.publications||[]).length, presentations:(d.presentations||[]).length, grants:(d.grants||[]).filter(g=>g.status==='awarded').length, mentees:(d.mentees||[]).length };
    }
    function getDeltas(yr) {
      const p = getPriorYear(yr); if (!p) return null;
      const c = getMetrics(yr), v = getMetrics(p), d = {};
      for (const k in c) d[k] = c[k] - v[k]; return d;
    }
    function makeEmpty(section) {
      const row = { id: generateId() };
      COLS[section].forEach(c => { row[c.key] = c.opts ? c.opts[0] : ''; }); return row;
    }

    // ── Display helpers ──────────────────────────────────────────────────────
    const LABELS = { published:'Published', submitted:'Submitted', 'in-revision':'In revision', 'in-preparation':'In preparation', 'original-article':'Original article', editorial:'Editorial', review:'Review', guidelines:'Guidelines', 'book-chapter':'Book chapter', 'invited-talk':'Invited talk', 'oral-abstract':'Oral abstract', poster:'Poster', workshop:'Workshop', awarded:'Awarded', 'under-review':'Under review', 'not-funded':'Not funded', undergraduate:'Undergraduate', 'medical-student':'Medical student', 'graduate-student':'Graduate student', resident:'Resident', fellow:'Fellow', faculty:'Faculty' };
    const BADGE_CLS = { published:'teal', submitted:'amber', 'in-revision':'amber', 'in-preparation':'muted', 'original-article':'muted', editorial:'muted', review:'muted', guidelines:'muted', 'book-chapter':'muted', 'invited-talk':'purple', 'oral-abstract':'teal', poster:'muted', workshop:'muted', awarded:'teal', 'under-review':'amber', 'not-funded':'muted', undergraduate:'muted', 'medical-student':'muted', 'graduate-student':'muted', resident:'dark-teal', fellow:'dark-teal', faculty:'purple' };
    function lbl(v) { return LABELS[v] || v || ''; }
    function bdg(v) { return `<span class="badge badge-${BADGE_CLS[v]||'muted'}">${lbl(v)}</span>`; }

    const COLS = {
      publications: [
        { key:'citation', label:'Citation', pct:60, tag:'textarea' },

      ],
      grants: [
        { key:'date', label:'Date', pct:11, tag:'input', ph:'MMM YYYY' },
        { key:'source', label:'Source', pct:13, tag:'input' },

      ],
      mentees: [
        { key:'name', label:'Name', pct:25, tag:'input' },
        { key:'level', label:'Level', pct:20, tag:'select', opts:['undergraduate','medical-student','graduate-student','resident','fellow','faculty'] },
        { key:'comments', label:'Comments / project', pct:49, tag:'input' },
      ],
    };
    const SHOW_ALL = {}, PAGE = 8;
    const charts = {};
    function makeChartConfig(type, labels, datasets, opts = {}) {
      return { type, data: { labels, datasets }, options: { responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display: datasets.length > 1 } },
        scales:{ x:{ grid:{ display:false }, ticks:{ font:{ size:11 } } }, y:{ grid:{ color:'rgba(128,128,128,0.1)' }, ticks:{ font:{ size:11 }, stepSize:1 }, beginAtZero:true } }, ...opts } };
    }

    // ── Table HTML builders ──────────────────────────────────────────────────
    function editRowHtml(section, row, isNew) {
      const n = isNew ? 1 : 0;
      const cells = COLS[section].map(c => {
        let inp;
        if (c.tag === 'select') inp = `<select data-field="${c.key}">${c.opts.map(o=>`<option value="${o}"${row[c.key]===o?' selected':''}>${lbl(o)}</option>`).join('')}</select>`;
        else if (c.tag === 'textarea') inp = `<textarea data-field="${c.key}" rows="2">${esc(row[c.key]||'')}</textarea>`;
        else inp = `<input type="text" data-field="${c.key}" value="${esc(row[c.key]||'')}" placeholder="${c.ph||''}">`;
        return `<td style="width:${c.pct}%">${inp}</td>`;
      }).join('');
      return `<tr class="edit-row" data-edit-id="${row.id}">${cells}<td><div class="edit-actions"><button class="btn-save-row" data-action="save-row" data-section="${section}" data-id="${row.id}" data-new="${n}">Save</button><button class="btn-cancel-row" data-action="cancel-row" data-section="${section}" data-id="${row.id}" data-new="${n}">Cancel</button></div></td></tr>`;
    }

    function viewRowHtml(section, row) {
      const cells = COLS[section].map(c => {
        const v = row[c.key] || '';
        return `<td style="width:${c.pct}%">${c.tag === 'select' ? bdg(v) : `<span class="${c.cls||''}">${esc(v)}</span>`}</td>`;
      }).join('');
      return `<tr data-view-id="${row.id}">${cells}<td class="row-actions"><button class="icon-btn" data-action="edit-row" data-section="${section}" data-id="${row.id}" title="Edit">✎</button> <button class="icon-btn" data-action="delete-row" data-section="${section}" data-id="${row.id}" title="Delete">✕</button></td></tr>`;
    }

    function deleteConfirmHtml(section, row) {
      return `<tr class="delete-confirm" data-delete-id="${row.id}"><td colspan="${COLS[section].length+1}"><div class="delete-confirm-msg">Delete this entry? <button class="btn-confirm-yes" data-action="confirm-delete" data-section="${section}" data-id="${row.id}">Yes</button> <button class="btn-confirm-no" data-action="cancel-delete" data-section="${section}" data-id="${row.id}">No</button></div></td></tr>`;
    }

    function tableHtml(section, yr) {
      const rows = state.years[yr]?.[section] || [];
      const key = section + yr, show = SHOW_ALL[key];
      const visible = show ? rows : rows.slice(0, PAGE);
      const heads = COLS[section].map(c=>`<th style="width:${c.pct}%">${c.label}</th>`).join('') + '<th></th>';
      const body = rows.length === 0
        ? `<tr><td colspan="${COLS[section].length+1}" class="empty-state">No entries yet — use Add to get started</td></tr>`
        : visible.map(r => viewRowHtml(section, r)).join('');
      const cnt = show || rows.length <= PAGE ? rows.length : PAGE;
      const foot = rows.length > 0 ? `<div class="table-footer"><span>Showing ${cnt} of ${rows.length}</span>${rows.length>PAGE?`<button class="show-all-btn" data-action="toggle-show-all" data-section="${section}">${show?'Show fewer':'Show all'}</button>`:''}</div>` : '';
      return `<table class="data-table"><thead><tr>${heads}</tr></thead><tbody>${body}</tbody></table>${foot}`;
    }

        : `<div class="goal-sub-label" style="margin-top:.4rem">Support needed</div>${gta('support',52)}`;
      return `<div class="goal-block${carried?' carried':''}" data-goal-id="${g.id}"><button class="goal-delete" data-action="delete-goal" data-goal-section="${section}" data-goal-id="${g.id}" title="Remove">✕</button>${ayTag}<div class="goal-sub-label">Goal</div><textarea class="se-textarea" data-goal-section="${section}" data-goal-id="${g.id}" data-goal-field="goalText" style="min-height:52px;margin-bottom:.5rem">${esc(g.goalText||'')}</textarea>${extra}</div>`;

    function renderSelfeval(yr) {

      document.getElementById('content-area').innerHTML = `
<div class="card"><div class="card-header"><span class="card-title">Contributions &amp; highlights</span></div><div style="padding:1.25rem"><p class="se-hint">What are your most important contributions and highlights this year?</p><p class="se-hint">Include your most significant contribution to the department, as well as anything else you'd like to highlight.</p>${TA('contributions',120)}</div></div>
<div class="card"><div class="card-header"><span class="card-title">${priorTitle} — review &amp; update</span></div><p class="se-hint" style="padding:.5rem 1.25rem 0">${reviewHint}</p><div id="goals-review" style="padding:.75rem 1.25rem 1.25rem">${rGoals}</div><div class="card-add-footer"><button class="btn-add-full" data-action="add-goal" data-goal-section="goalsReview">+</button></div></div>
<div class="card"><div class="card-header"><span class="card-title">AY '${yr} goals</span></div><p class="se-hint" style="padding:.5rem 1.25rem 0">Set your goals for the coming year and note what support you need.</p><div id="goals-next" style="padding:.75rem 1.25rem 1.25rem">${nGoals}</div><div class="card-add-footer"><button class="btn-add-full" data-action="add-goal" data-goal-section="goalsNext">+</button></div></div>
<div class="card"><div class="card-header"><span class="card-title">Leadership roles</span></div><div class="ld-cols"><span class="mentor-col-label" style="flex:1">Role</span><span class="mentor-col-label" style="flex:1">Plan / focus for ${yr}</span><span style="width:2rem"></span></div><div id="ld-list">${ldRows}</div><div class="card-add-footer"><button class="btn-add-full" data-action="add-leadership">+</button></div></div>
<div class="card"><div class="card-header"><span class="card-title">Academic promotion</span></div><div style="padding:1.25rem">${CK('promotion.active','Actively working toward academic promotion in the next year')}<div class="se-label">Where are you in this process?</div>${TA('promotion.whereInProcess',60)}<div class="se-label">What input or guidance do you need?</div>${TA('promotion.guidanceNeeded',52)}</div></div>
<div class="card"><div class="card-header"><span class="card-title">CARE+ &amp; salary review</span></div><div style="padding:1.25rem">${CK('careReview.completed','Reviewed CARE+ salary sheet and funding sources with Division Chief')}<div class="se-label">Outstanding questions or unresolved issues</div>${TA('careReview.outstandingQuestions',52)}</div></div>
<div class="card"><div class="card-header"><span class="card-title">Professional development</span></div><div style="padding:1.25rem"><div class="se-label" style="margin-top:0">How can the department support your career over the next 2–3 years?</div>${TA('profDevelopment',80)}</div></div>
<div class="card" style="background:var(--c-bg-secondary)"><div class="card-header"><span class="card-title">Division Chief comments</span></div><div style="padding:1.25rem;color:var(--c-text-muted);font-style:italic;font-size:.875rem">Division Chief comments — completed by leadership after submission.</div></div>`;
      document.querySelectorAll('#content-area .se-textarea').forEach(autoExpand);
    }

    function deltaHtml(d, key) {
      if (!d) return '';
      if (d[key] === 0) return '<span class="delta-same">same as prior</span>';
      const n = d[key]; return `<span class="${n>0?'delta-pos':'delta-neg'}">${n>0?'+':''}${n} vs prior</span>`;
    }

    function renderOverview(yr) {
      const yd = state.years[yr] || {}, se = yd.selfeval || {};
      const m = getMetrics(yr), d = getDeltas(yr);
      const mc = (label, value, key) => `<div class="metric-card"><div class="metric-label">${label}</div><div class="metric-value">${value}</div>${deltaHtml(d,key)}</div>`;
      const goTab = (tab, text) => `<button class="snapshot-more" data-action="go-tab" data-tab="${tab}">${text}</button>`;

      // Profile card + prior-year goals
      const priorYr = getPriorYear(yr);
      const goalsReview = (se.goalsReview || []).filter(g => (g.goalText||'').trim());

      // Table builder — reuses existing data-table CSS
      const tbl = (heads, rows, span) => {
        const ths = heads.map(([label, w]) => `<th${w?` style="width:${w}"`:''}>${label}</th>`).join('');
        const body = rows.length
          ? rows.join('')
          : `<tr><td colspan="${span}" class="empty-state">No entries yet.</td></tr>`;
        return `<table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${body}</tbody></table>`;
      };

      // Publications — Citation | Status | Type
      const pubs = yd.publications || [];
      const pubTbl = tbl(
        [['Citation','62%'],['Status','16%'],['Type','']],
        pubs.slice(0,5).map(p => `<tr><td>${esc(p.citation)}</td><td>${bdg(p.status)}</td><td>${bdg(p.type)}</td></tr>`),
        3);
      const pubMore = pubs.length > 5 ? goTab('publications', `+${pubs.length-5} more — view all →`) : '';

      // Presentations — Date | Event | Type | Title
      const prs = yd.presentations || [];
      const prsTbl = tbl(
        [['Date','10%'],['Event','27%'],['Type','14%'],['Title','']],
        prs.slice(0,5).map(p => `<tr><td style="white-space:nowrap;color:var(--c-text-muted)">${esc(p.date)}</td><td>${esc(p.event)}</td><td>${bdg(p.type)}</td><td style="font-style:italic">${esc(p.title)}</td></tr>`),
        4);
      const prsMore = prs.length > 5 ? goTab('presentations', `+${prs.length-5} more — view all →`) : '';

      // Grants — Date | Source | Type | Title | Status
      const grn = yd.grants || [];
      const grnTbl = tbl(
        [['Date','10%'],['Source','11%'],['Type','9%'],['Title',''],['Status','15%']],
        grn.slice(0,5).map(g => `<tr><td style="white-space:nowrap;color:var(--c-text-muted)">${esc(g.date)}</td><td>${esc(g.source)}</td><td>${esc(g.grantType)}</td><td>${esc(g.title)}</td><td>${bdg(g.status)}</td></tr>`),
        5);
      const grnMore = grn.length > 5 ? goTab('grants', `+${grn.length-5} more — view all →`) : '';

      // Mentors & mentees — Name | Level | Comments
      const mentors = yd.mentors || [], mentees = yd.mentees || [];
      const mentorLine = mentors.length ? mentors.map(x => esc(x.name)).join(', ') : `<em class="snapshot-empty">No mentors added yet.</em>`;
      const menteeTbl = tbl(
        [['Name','26%'],['Level','21%'],['Comments / project','']],
        mentees.slice(0,5).map(x => `<tr><td>${esc(x.name)}</td><td>${bdg(x.level)}</td><td style="color:var(--c-text-secondary)">${esc(x.comments)}</td></tr>`),
        3);
      const menteeMore = mentees.length > 5 ? goTab('mentors', `+${mentees.length-5} more →`) : '';

      // Self-eval highlights
      const contrib = (se.contributions||'').trim();
      const reviewed = (se.goalsReview||[]).filter(g=>(g.progress||'').trim()).length;
      const nextCount = (se.goalsNext||[]).length;
      const nyMatch = yr.match(/^(\d{4})/);
      const nextYr = nyMatch ? `${+nyMatch[1]+1}-${String((+nyMatch[1]+1)%100+1).padStart(2,'0')}` : 'next year';

      const fac = state.faculty;
      document.getElementById('content-area').innerHTML = `
        <div class="card" style="margin-bottom:1rem"><div style="padding:.85rem 1.5rem;display:flex;align-items:baseline;gap:.75rem;flex-wrap:wrap">
          <span style="font-size:.95rem;font-weight:600">${esc(fac.name||'—')}</span>
          <span style="font-size:.85rem;color:var(--c-text-secondary)">${esc(fac.title||'')}${fac.division?' · '+esc(fac.division):''}</span>
          <span style="font-size:.78rem;color:var(--c-purple);font-weight:500;margin-left:auto">AY ${yr}</span>
        </div></div>
        <div class="metrics-grid" style="margin-bottom:1rem">${mc('Publications',m.publications,'publications')}${mc('Presentations',m.presentations,'presentations')}${mc('Active grants',m.grants,'grants')}${mc('Mentees',m.mentees,'mentees')}</div>
        <div class="snapshot-body">
          ${goalsReview.length ? `<div class="snapshot-section">
            <h3>GOALS — ${priorYr || yr}</h3>
            ${goalsReview.map(g => `<div style="font-size:13px;padding:4px 0">${esc(g.goalText)}</div>`).join('')}
            <div style="padding:6px 0 2px">${goTab('selfeval','View in self-evaluation →')}</div>
          </div>` : ''}
          <div class="snapshot-section"><h3>Publications</h3>${pubTbl}${pubMore?`<div style="padding:4px 0">${pubMore}</div>`:''}</div>
          <div class="snapshot-section"><h3>Presentations</h3>${prsTbl}${prsMore?`<div style="padding:4px 0">${prsMore}</div>`:''}</div>
          <div class="snapshot-section"><h3>Grants</h3>${grnTbl}${grnMore?`<div style="padding:4px 0">${grnMore}</div>`:''}</div>
          <div class="snapshot-section"><h3>Mentors &amp; Mentees</h3>
            <div style="font-size:.85rem;padding:2px 0 8px"><span style="font-weight:500">Mentored by:</span> ${mentorLine}</div>
            ${menteeTbl}${menteeMore?`<div style="padding:4px 0">${menteeMore}</div>`:''}
          </div>
          <div class="snapshot-section"><h3>Self-Evaluation Highlights</h3>
            ${contrib
              ? `<div class="snapshot-contrib">${esc(contrib)}</div><div style="padding:4px 0">${goTab('selfeval','Read more →')}</div>`
              : `<p class="snapshot-empty">No contributions text yet. ${goTab('selfeval','Add →')}</p>`}
            <div style="font-size:12px;color:var(--c-text-muted);padding-top:8px">${reviewed} goal${reviewed!==1?'s':''} reviewed · ${nextCount} new goal${nextCount!==1?'s':''} for ${nextYr} — ${goTab('selfeval','View self-evaluation →')}</div>
          </div>
        </div>`;
    }

    function renderContent() {
      const yr = state.activeYear, tab = TABS.find(t => t.id === activeTab);
      if (activeTab === 'overview') renderOverview(yr);
      else if (activeTab === 'publications') renderPublications(yr);
      else if (activeTab === 'presentations') renderPresentations(yr);
      else if (activeTab === 'grants') renderGrants(yr);
      else if (activeTab === 'mentors') renderMentors(yr);
      else if (activeTab === 'selfeval') renderSelfeval(yr);
      else if (activeTab === 'trends') renderTrends();
      else document.getElementById('content-area').innerHTML = `<div class="tab-placeholder"><p>${tab?.label} — coming in next phase</p></div>`;
      document.getElementById('content-area').insertAdjacentHTML('afterbegin', `<h2 class="section-print-header">${tab?.label||''}</h2>`);
    }

    // ── Chrome renderers ─────────────────────────────────────────────────────
    function renderHeader() {
      document.getElementById('faculty-name').textContent = state.faculty.name || 'Faculty Review';
      document.getElementById('faculty-title').textContent = state.faculty.title || '';
      if (!document.getElementById('btn-edit-profile')) {
        const b = document.createElement('button'); b.id = 'btn-edit-profile'; b.className = 'profile-edit-btn'; b.title = 'Edit profile'; b.textContent = '✎';
        document.getElementById('faculty-info').appendChild(b);
      }
      document.getElementById('btn-edit-profile').style.display = state.faculty.name ? '' : 'none';
      const p = document.getElementById('ay-pills'); p.innerHTML = '';
      Object.keys(state.years).forEach(yr => {
        const wrap = document.createElement('span'); wrap.className = 'ay-pill-wrap'; p.appendChild(wrap);
        const b = document.createElement('button'); b.className = 'ay-pill' + (yr === state.activeYear ? ' active' : ''); b.textContent = yr; b.dataset.year = yr; wrap.appendChild(b);
        const del = document.createElement('button'); del.className = 'ay-del'; del.dataset.deleteYear = yr; del.title = 'Remove year'; del.textContent = '×'; wrap.appendChild(del);
        if (state.years[yr].submitted) { const sb = document.createElement('span'); sb.className = 'submitted-badge'; sb.textContent = 'Submitted'; wrap.appendChild(sb); }
      });
      const a = document.createElement('button'); a.className = 'ay-pill ay-add'; a.id = 'btn-add-year'; a.title = 'Add academic year'; a.textContent = '+'; p.appendChild(a);
    }
    function renderTabBar() {
      const bar = document.getElementById('tab-bar'); bar.innerHTML = '';
      TABS.forEach(t => { const b = document.createElement('button'); b.className = 'tab-btn' + (t.id === activeTab ? ' active' : ''); b.textContent = t.label; b.dataset.tab = t.id; bar.appendChild(b); });
    }
    function render() { renderHeader(); renderTabBar(); renderContent(); renderSetupCard(); }

    // ── Event delegation: content area ───────────────────────────────────────
    document.getElementById('content-area').addEventListener('click', e => {
      const btn = e.target.closest('[data-action]'); if (!btn) return;
      const action = btn.dataset.action, section = btn.dataset.section, id = btn.dataset.id, yr = state.activeYear;

      if (action === 'add-row') {
        const row = makeEmpty(section);
        const div = document.getElementById('table-'+section);
        const tbody = div.querySelector('tbody');
        const empty = tbody.querySelector('.empty-state');
        if (empty) empty.closest('tr').remove();
        tbody.insertAdjacentHTML('beforeend', editRowHtml(section, row, true));
        const first = div.querySelector(`[data-edit-id="${row.id}"] input, [data-edit-id="${row.id}"] select, [data-edit-id="${row.id}"] textarea`);
        if (first) first.focus();
        return;
      }
      if (action === 'edit-row') {
        const row = state.years[yr][section].find(r => r.id === id); if (!row) return;
        const tr = document.querySelector(`[data-view-id="${id}"]`); if (tr) tr.outerHTML = editRowHtml(section, row, false);
        const first = document.querySelector(`[data-edit-id="${id}"] input, [data-edit-id="${id}"] select, [data-edit-id="${id}"] textarea`);
        if (first) first.focus();
        return;
      }
      if (action === 'save-row') {
        const isNew = btn.dataset.new === '1';
        const editTr = document.querySelector(`[data-edit-id="${id}"]`); if (!editTr) return;
        const rowData = { id };
        editTr.querySelectorAll('[data-field]').forEach(inp => { rowData[inp.dataset.field] = inp.value; });
        if (isNew) {
          state.years[yr][section].push(rowData);
        } else {
          const idx = state.years[yr][section].findIndex(r => r.id === id);
          if (idx >= 0) Object.assign(state.years[yr][section][idx], rowData);
        }
        updateDirtyIndicator();
        editTr.outerHTML = viewRowHtml(section, isNew ? rowData : state.years[yr][section].find(r=>r.id===id));
        return;
      }
      if (action === 'cancel-row') {
        const isNew = btn.dataset.new === '1';
        const editTr = document.querySelector(`[data-edit-id="${id}"]`); if (!editTr) return;
        if (isNew) {
          editTr.remove();
          const tbody = document.querySelector('#table-'+section+' tbody');
          if (tbody && !tbody.querySelector('tr')) tbody.innerHTML = `<tr><td colspan="${COLS[section].length+1}" class="empty-state">No entries yet — use Add to get started</td></tr>`;
        } else {
          const row = state.years[yr][section].find(r => r.id === id);
          if (row) editTr.outerHTML = viewRowHtml(section, row);
        }
        return;
      }
      if (action === 'delete-row') {
        const tr = document.querySelector(`[data-view-id="${id}"]`);
        const row = state.years[yr][section].find(r => r.id === id);
        if (tr && row) tr.outerHTML = deleteConfirmHtml(section, row);
        return;
      }
      if (action === 'confirm-delete') {
        state.years[yr][section] = state.years[yr][section].filter(r => r.id !== id);
        updateDirtyIndicator(); refreshTable(section, yr); return;
      }
      if (action === 'cancel-delete') {
        const tr = document.querySelector(`[data-delete-id="${id}"]`);
        const row = state.years[yr][section].find(r => r.id === id);
        if (tr && row) tr.outerHTML = viewRowHtml(section, row); return;
      }
      if (action === 'toggle-show-all') {
        SHOW_ALL[section+yr] = !SHOW_ALL[section+yr]; refreshTable(section, yr); return;
      }
      if (action === 'add-mentor') {
        const m = { id: generateId(), name:'', titleRole:'' };
        state.years[yr].mentors.push(m); updateDirtyIndicator();
        const list = document.getElementById('mentor-list');
        const empty = list.querySelector('.empty-state'); if (empty) list.innerHTML = '';
        list.insertAdjacentHTML('beforeend', mentorRowHtml(m));
        const first = list.querySelector(`[data-mentor-id="${m.id}"] input`); if (first) first.focus();
        return;
      }
      if (action === 'dismiss-alert') { document.getElementById('validation-alert')?.classList.add('hidden'); return; }
      if (action === 'go-tab') { switchTab(btn.dataset.tab); return; }
      if (action === 'add-goal') {
        const gs = btn.dataset.goalSection;
        const g = { id:generateId(), goalText:'', carriedFrom:'', progress:'', barriers:'', feedback:'', support:'' };
        state.years[yr].selfeval[gs].push(g); updateDirtyIndicator();
        const cid = gs === 'goalsReview' ? 'goals-review' : 'goals-next';
        const c = document.getElementById(cid);
        if (c) { c.insertAdjacentHTML('beforeend', goalBlockHtml(g, gs)); const nb = c.querySelector(`[data-goal-id="${g.id}"]`); if (nb) { nb.querySelectorAll('.se-textarea').forEach(autoExpand); nb.querySelector('.se-textarea')?.focus(); } }
        return;
      }
      if (action === 'delete-goal') {
        const gs = btn.dataset.goalSection, gid = btn.dataset.goalId;
        state.years[yr].selfeval[gs] = state.years[yr].selfeval[gs].filter(g => g.id !== gid);
        updateDirtyIndicator();
        document.querySelector(`.goal-block[data-goal-id="${gid}"]`)?.remove();
        return;
      }
      if (action === 'add-leadership') {
        const l = { id:generateId(), role:'', plan:'' };
        state.years[yr].selfeval.leadership.push(l); updateDirtyIndicator();
        const list = document.getElementById('ld-list');
        if (list) { const empty = list.querySelector('.empty-state'); if (empty) list.innerHTML = ''; list.insertAdjacentHTML('beforeend', leadershipRowHtml(l)); list.querySelector(`[data-ld-id="${l.id}"] input`)?.focus(); }
        return;
      }
      if (action === 'delete-leadership') {
        state.years[yr].selfeval.leadership = state.years[yr].selfeval.leadership.filter(l => l.id !== id);
        updateDirtyIndicator();
        const row = document.querySelector(`.ld-row[data-ld-id="${id}"]`); if (row) { row.remove(); const list = document.getElementById('ld-list'); if (list && !list.querySelector('.ld-row')) list.innerHTML = '<p class="empty-state">No roles added yet.</p>'; }
        return;
      }
      if (action === 'delete-mentor') {
        state.years[yr].mentors = state.years[yr].mentors.filter(m => m.id !== id);
        updateDirtyIndicator();
        const row = document.querySelector(`.mentor-row[data-mentor-id="${id}"]`); if (row) row.remove();
        const list = document.getElementById('mentor-list');
        if (list && !list.querySelector('.mentor-row')) list.innerHTML = `<p class="empty-state">No mentors yet — use Add to get started</p>`;
        return;
      }
    });

    document.getElementById('content-area').addEventListener('input', e => {
      if (e.target.classList.contains('se-textarea')) autoExpand(e.target);
      const yr = state.activeYear;
      const gs = e.target.dataset.goalSection;
      if (gs) { const g = (state.years[yr].selfeval[gs]||[]).find(x=>x.id===e.target.dataset.goalId); if (g) { g[e.target.dataset.goalField]=e.target.value; updateDirtyIndicator(); } return; }
      const ldField = e.target.dataset.ldField;
      if (ldField) { const l = (state.years[yr].selfeval.leadership||[]).find(x=>x.id===e.target.dataset.ldId); if (l) { l[ldField]=e.target.value; updateDirtyIndicator(); } return; }
      const mField = e.target.dataset.mentorField, mid = e.target.dataset.mentorId;
      if (mField && mid) { const m = state.years[yr].mentors.find(x=>x.id===mid); if (m) { m[mField]=e.target.value; updateDirtyIndicator(); } return; }
      const bind = e.target.dataset.bind;
      if (bind) {
        const parts = bind.split('.'); let obj = state.years[yr];
        for (let i=0; i<parts.length-1; i++) obj = obj[parts[i]] || (obj[parts[i]]={});
        obj[parts[parts.length-1]] = e.target.value; updateDirtyIndicator();
      }
    });

    document.getElementById('content-area').addEventListener('change', e => {
      if (e.target.type !== 'checkbox' || !e.target.dataset.bind) return;
      const yr = state.activeYear, parts = e.target.dataset.bind.split('.');
      let obj = state.years[yr];
      for (let i=0; i<parts.length-1; i++) obj = obj[parts[i]] || (obj[parts[i]]={});
      obj[parts[parts.length-1]] = e.target.checked; updateDirtyIndicator();
    });

    document.getElementById('content-area').addEventListener('keydown', e => {
      const editTr = e.target.closest('.edit-row'); if (!editTr) return;
      if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); editTr.querySelector('[data-action="save-row"]')?.click(); }
      if (e.key === 'Escape') editTr.querySelector('[data-action="cancel-row"]')?.click();
    });

    // ── Keyboard shortcuts ───────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey && e.key === 'n') {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        e.preventDefault();
        document.querySelector('#content-area .btn-add-full')?.click();
      }
    });

    // ── Event delegation: chrome ─────────────────────────────────────────────
    document.addEventListener('click', e => {
      if (e.target.id === 'btn-add-year') { addYear(); return; }
      if (e.target.dataset.deleteYear) {
        const yr = e.target.dataset.deleteYear;
        if (Object.keys(state.years).length <= 1) return;
        if (!confirm(`Remove AY ${yr} and all its data? This cannot be undone.`)) return;
        delete state.years[yr];
        if (state.activeYear === yr) state.activeYear = Object.keys(state.years).sort().at(-1);
        updateDirtyIndicator(); render(); return;
      }
      if (e.target.id === 'btn-edit-profile') { showProfileCard(); return; }
      if (e.target.dataset.action === 'close-profile-card') { document.getElementById('setup-card')?.remove(); return; }
      if (e.target.id === 'btn-save') { saveMasterFile(); return; }
      if (e.target.id === 'btn-export') { exportReadOnlyDashboard(); return; }
      if (e.target.id === 'btn-import') { importData(); return; }
      if (e.target.id === 'btn-submit') {
        const yd = state.years[state.activeYear]||{}, se = yd.selfeval||{}, missing = [];
        if (!(se.contributions||'').trim()) missing.push('Self-evaluation contributions');
        if (!(yd.publications||[]).length) missing.push('At least 1 publication');
        if (!(se.goalsReview||[]).some(g=>(g.progress||'').trim())) missing.push('At least 1 goal with progress update');
        if (missing.length) { showAlert('<b>Please complete the following before submitting:</b><ul>'+missing.map(m=>`<li>${m}</li>`).join('')+'</ul>'); return; }
        state.years[state.activeYear].submitted = true; saveMasterFile(); exportThisAY(); render(); return;
      }
      if (e.target.id === 'btn-setup-save') {
        const name = document.getElementById('setup-name')?.value.trim(); if (!name) { document.getElementById('setup-name')?.focus(); return; }
        state.faculty.name = name; state.faculty.title = document.getElementById('setup-title')?.value.trim()||''; state.faculty.division = document.getElementById('setup-division')?.value.trim()||'';
        document.getElementById('setup-card')?.remove(); updateDirtyIndicator(); renderHeader(); return;
      }
      if (e.target.dataset.action === 'restore-backup') {
        if (pendingBackup) { state = pendingBackup; normalizeState(); savedSnapshot = JSON.stringify(state); pendingBackup = null; }
        document.getElementById('recovery-banner')?.remove(); render(); return;
      }
      if (e.target.dataset.action === 'dismiss-banner') { document.getElementById('recovery-banner')?.remove(); pendingBackup = null; return; }
      const pill = e.target.closest('.ay-pill[data-year]'); if (pill) { switchYear(pill.dataset.year); return; }
      const tab = e.target.closest('.tab-btn'); if (tab) { switchTab(tab.dataset.tab); return; }
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadState(); render(); checkRecovery();
      setInterval(autoSave, 60000);
      window.addEventListener('beforeunload', e => { if (isDirty()) { e.preventDefault(); e.returnValue = ''; } });
    });
  </script>
</body>
</html>
